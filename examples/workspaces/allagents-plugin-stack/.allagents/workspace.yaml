version: 2

# Example: Multi-client AllAgents plugin stack
#
# This workspace demonstrates installing an agent workflow stack for Codex,
# Copilot, and Claude from a single declarative workspace file. AllAgents syncs
# these plugins into project-scoped files for each configured client, so users
# do not need to run separate global plugin install commands on each machine.
#
# What gets generated:
# - Per-client skills directories such as .codex/skills/, .copilot/skills/, and .claude/skills/
#   with skills from workmux, agent-tui, Beads, Compound Engineering, and Understand Anything
# - Per-client hook/config files such as .codex/hooks.json, merged with any existing user-owned hooks
#   according to the clients list
#
# Requirements for using every synced skill/hook:
# - agent-tui on PATH for the agent-tui skills
# - bd on PATH for Beads workflows/hooks

repositories: []

plugins:
  # Worktree/tmux workflow skills.
  - https://github.com/raine/workmux/

  # Beads project-management skills and Codex hooks.
  - https://github.com/gastownhall/beads/tree/main/plugins/beads

  # Compound Engineering skills. This is project-scoped skill sync; it does not
  # require `bunx @every-env/compound-plugin install compound-engineering --to codex`.
  - https://github.com/EveryInc/compound-engineering-plugin/tree/main/plugins/compound-engineering

  # Agent TUI skills. The `agent-tui` binary is still installed separately.
  - https://github.com/pproenca/agent-tui/tree/master/skills

  # Understand Anything — codebase/knowledge-graph onboarding skills.
  - https://github.com/Egonex-AI/Understand-Anything/tree/main/understand-anything-plugin

clients:
  - codex
  - copilot
  - claude

syncMode: copy
